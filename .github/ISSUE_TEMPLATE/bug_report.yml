name: Bug report
description: Report a reproducible defect without including private data.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, private source, or a live tunnel URL. Report
        exploitable security issues through the private process in SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest redacted reproduction.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Windows or macOS version, PowerShell/Python/cloudflared versions"
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Redacted output
      description: Remove local paths, public URLs, credentials, and private content.
  - type: checkboxes
    id: hygiene
    attributes:
      label: Data-safety confirmation
      options:
        - label: I removed secrets, private source, and live tunnel URLs.
          required: true
