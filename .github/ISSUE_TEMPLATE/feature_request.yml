name: Feature request
description: Propose an improvement and its safety implications.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the observable behavior, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety, privacy, and compatibility impact
      description: Consider public exposure, secret scanning, cleanup, CLI, and platforms.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
